    Experience:
      - company: biohub
        position: Staff Data Scientist
        location: New york, NY
        start_date: 2025
        end_date: Present
        summary: Technical lead of the Billion Cell Project, and scaling single-cell biology for research groups at the biohub
        highlights:
          - Technical lead for the Billion Cells Project, supporting labs generating millions of single-cell transcriptomic profiles.
          - Lead a team scaling the processing, analysis, and infrastructure needed to make these datasets accessible and usable for researchers.
          - Work directly with partner labs to support computational biology needs, mentoring scientists and helping design analyses and experimental strategies.

      - company: insitro
        position: Senior Data Scientist
        location: San Francisco, CA
        start_date: 2023
        end_date: 2024
        summary: AI-driven drug discovery at insitro to desing, analyze and interpret large-scale single-cell experiments.
        highlights:
          - Partnered closely with experimental scientists to design experiments that informed therapeutic programs and target prioritization.
          - Iterated rapidly with wet-lab teams to refine experimental strategies and integrate computational insights into decision-making for clinical programs.
          
      - company: Chan Zuckerberg Initiative
        position: Computational Biologist and Product Manager
        location: Redwood City, CA
        start_date: 2020
        end_date: 2023
        summary: Computational biologist and product manager of CELLxGENE Census, led teams in feature development, and scientific validity of our tools.
        highlights:
          - Developed and prototyped algorithms for processing and analysis of single-cell data. Collaborated with engineers to bring methdods to production for 1000+ datasets.
          - Defined, developed, and launched single-cell software products. Led a team of engineers and UXR to deliver CELLxGENE Census for large-scale modeling use cases.
          
      - company: Fraser and Morrison Labs, Stanford University
        position: Ph.D. Researcher
        location: Stanford, CA
        start_date: 2015
        end_date: 2020
        summary: Application of evolution and population genomics to understand the mutational process in humans.
        highlights:
          - Pioneered computational methods to study somatic mutation landscape using 10,000+ sequencing samples from 500+ individuals
          - Integrated genomics, transcriptomics, and phenotypic data to uncover mechanisms of somatic mutation acquisition
          - Developed sequencing technologies to map UV-induced DNA lesions genome-wide

      - company: Morrison Lab, Stanford University
        position: Research Assistant
        location: Stanford, CA
        start_date: 2013
        end_date: 2015
        summary: Investigated how 3D genome structure influences genomic susceptibility to UV radiation.
        highlights:
          - Developed a novel sequencing technique to map UV-induced DNA lesions
          - Integrated melanoma mutation data with epigenomics data to characterize carcinogen susceptibility

      - company: Vielle-Calzada Lab, LANGEBIO
        position: Computational Biologist
        location: Irapuato, Mexico
        start_date: 2011
        end_date: 2012
        highlights:
          - Applied functional genomics and computational biology to investigate sexual development in plants
          - Processed and analyzed small-RNA sequencing data from plant ovules

